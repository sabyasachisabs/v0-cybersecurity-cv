name: Notify portfolio

on:
  push:
    branches:
      - main
      - master

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger portfolio refresh
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PORTFOLIO_TRIGGER_TOKEN }}" \
            https://api.github.com/repos/sabyasachisabs/sabyasachisabs.github.io/dispatches \
            -d '{"event_type":"refresh-portfolio"}'
